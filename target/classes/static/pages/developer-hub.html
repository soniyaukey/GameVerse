<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Hub - GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-900 text-white">

<!-- NAVBAR -->
<nav class="bg-gray-800 p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-yellow-400">🧑‍💻 Developer Hub</h1>
    <div class="space-x-4">
        <a href="../index.html" class="hover:text-yellow-400">← Home</a>
        <a href="games.html" class="hover:text-yellow-400">Games</a>
    </div>
</nav>

<!-- HEADER -->
<div class="text-center py-12">
    <h1 class="text-4xl font-bold mb-4">🚀 Project Games Showcase</h1>
    <p class="text-xl text-gray-300 max-w-2xl mx-auto">Discover the games built for GameVerse Hub with detailed descriptions</p>
</div>

<!-- LOADING -->
<p id="loading" class="text-center text-gray-400 text-xl py-20 hidden">Loading project games...</p>

<!-- GAMES GRID -->
<div id="gamesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 px-6 pb-20 max-w-7xl mx-auto"></div>

<script src="../js/api.js"></script>
<script>
async function loadProjectGames() {
    try {
        const games = await getGames();
        const projectGames = games.filter(g => g.gameType === 'OFFLINE' || g.status === 'APPROVED');
        document.getElementById('loading').classList.add('hidden');
        renderProjectGames(projectGames);
    } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load games';
    }
}

function renderProjectGames(games) {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = games.map(game => `
        <div class="bg-gray-800 rounded-xl p-8 hover:bg-gray-700 transition-all duration-300 border border-gray-700">
            <div class="w-full h-48 bg-gradient-to-r from-purple-600 to-blue-600 rounded-lg flex items-center justify-center mb-6 overflow-hidden">
                ${game.imageUrl ? `<img src="${game.imageUrl}" class="w-full h-full object-cover" alt="${game.title}" onerror="this.parentElement.innerHTML='<span class=\\"text-6xl\\">🎮</span>'">` : '<span class="text-6xl">🎮</span>'}
            </div>
            <h2 class="text-2xl font-bold mb-4">${game.title}</h2>
            <p class="text-gray-300 leading-relaxed mb-6">${game.description || 'No description available.'}</p>
            <div class="flex gap-4 text-sm text-gray-400 mb-4">
                <span>${game.category}</span>
                <span>•</span>
                <span>${game.gameType}</span>
            </div>
            <button onclick="playGame('${game.gamePath}')" class="w-full play-btn">
                ▶ Play Game
            </button>
        </div>
    `).join('');
}

function playGame(gamePath) {
    window.location.href = `../games/${gamePath}/index.html`;
}

loadProjectGames();
</script>

</body>
</html>

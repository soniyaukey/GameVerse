<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #1e3c72, #2a5298);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass { 
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .form-glow { box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1); }
        .btn-glow { box-shadow: 0 10px 30px rgba(34,197,94,0.4); }
        .btn-glow:hover { box-shadow: 0 15px 40px rgba(34,197,94,0.6); transform: translateY(-2px); }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.2); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float { animation: float 6s ease-in-out infinite; }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Background Game Elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl float"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl float" style="animation-delay: -2s;"></div>
        <div class="absolute top-1/2 left-1/4 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl float" style="animation-delay: -4s;"></div>
    </div>

    <!-- Main Form -->
    <main class="w-full max-w-md glass rounded-3xl p-10 form-glow">
        <!-- Logo & Title -->
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-gradient-to-r from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                <i class="fas fa-gamepad text-3xl text-black font-bold"></i>
            </div>
            <h1 class="text-4xl font-black bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent mb-2">
                Welcome Back
            </h1>
            <p class="text-gray-300 text-lg">Sign in to your GameVerse Hub account</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                    <i class="fas fa-envelope text-emerald-400"></i>
                    Email Address
                </label>
                <input type="email" id="email" required 
                       class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 input-glow transition-all duration-300 text-lg"
                       placeholder="your@email.com">
            </div>

            <!-- Password -->
            <div class="relative">
                <label class="block text-sm font-semibold text-gray-200 mb-2 flex items-center gap-2">
                    <i class="fas fa-lock text-emerald-400"></i>
                    Password
                </label>
                <input type="password" id="password" required 
                       class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 input-glow transition-all duration-300 pr-12 text-lg"
                       placeholder="••••••••">
                <button type="button" id="togglePassword" class="absolute right-4 top-14 text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <!-- Remember & Forgot -->
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 bg-white/20 border-white/30 rounded focus:ring-indigo-500 text-emerald-500">
                    <span class="text-gray-300">Remember me</span>
                </label>
                <a href="#" class="text-indigo-400 hover:text-indigo-300 font-medium">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" id="loginBtn" 
                    class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-black font-bold text-xl py-5 px-8 rounded-3xl btn-glow shadow-2xl transform transition-all duration-300 uppercase tracking-wide">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-10">
            <div class="absolute inset-0 flex items-center">
                <span class="w-full border-t border-white/20"></span>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-gray-900/80 text-gray-400">Don't have account?</span>
            </div>
        </div>

        <!-- Register Link -->
        <a href="register.html" class="block w-full bg-gradient-to-r from-gray-700 to-gray-800 hover:from-gray-600 hover:to-gray-700 text-white font-semibold text-lg py-4 px-8 rounded-3xl text-center glass hover:shadow-lg transition-all duration-300 border border-white/20">
            <i class="fas fa-user-plus mr-2"></i>
            Create New Account
        </a>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 toast hidden p-6 rounded-2xl shadow-2xl text-lg font-semibold z-50">
        <i class="fas fa-circle-check mr-3 text-emerald-400"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Form validation & submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Signing In...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    showToast('Login successful! 🎮', 'success');
                    setTimeout(() => {
                        window.location.href = '/pages/games.html';
                    }, 1200);
                } else {
                    showToast(data.message || 'Please register first', 'error');
                    showRegisterPopup();
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
            } finally {
                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
            }
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = toast.querySelector('i');
            const toastMsg = document.getElementById('toastMessage');
            
            toastMsg.textContent = message;
            
            if (type === 'success') {
                toast.className = 'fixed top-6 right-6 bg-emerald-500/90 backdrop-blur-xl p-6 rounded-2xl shadow-2xl text-lg font-semibold z-50 toast border border-emerald-400/50';
                toastIcon.className = 'fas fa-circle-check mr-3 text-emerald-50 text-xl';
            } else {
                toast.className = 'fixed top-6 right-6 bg-red-500/90 backdrop-blur-xl p-6 rounded-2xl shadow-2xl text-lg font-semibold z-50 toast border border-red-400/50';
                toastIcon.className = 'fas fa-exclamation-circle mr-3 text-red-50 text-xl';
            }
            
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 4000);
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        });
        // Register popup for failed login
        function showRegisterPopup() {
            const popup = document.createElement('div');
            popup.innerHTML = `
                <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div class="bg-gradient-to-br from-gray-800 to-gray-900 border border-white/20 rounded-3xl p-8 max-w-md w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">New to GameVerse?</h3>
                            <button onclick="this.parentElement.parentElement.parentElement.remove()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                        </div>
                        <p class="text-gray-300 mb-8 text-lg leading-relaxed">Create your account to unlock unlimited gaming!</p>
                        <div class="space-y-4">
                            <button onclick="window.location.href='/pages/register.html'" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                                <i class="fas fa-user-plus mr-2"></i>Create Account Now
                            </button>
                            <button onclick="this.parentElement.parentElement.parentElement.remove()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-4 px-6 rounded-xl border border-gray-600 transition-all duration-300">
                                Maybe Later
                            </button>
                        </div>
                    </div>
                </div>`;
            document.body.appendChild(popup);
        }
    </script>
</body>
</html>

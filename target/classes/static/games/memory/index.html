<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Memory Match - GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e1b4b 0%, #0f0f23 50%, #1a182e 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: auto;
        }
        .header-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 25px;
            border: 3px solid rgba(99, 102, 241, 0.6);
            padding: 25px 50px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.8);
            max-width: 98vw;
            width: 900px;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-title {
            font-size: 1em;
            opacity: 0.85;
            margin-bottom: 8px;
            color: #e5e7eb;
        }
        .stat-number {
            font-size: 3.2em;
            font-weight: 900;
            display: block;
        }
        .score-number { color: #10b981; text-shadow: 0 0 30px #10b981; }
        .moves-number { color: #f59e0b; text-shadow: 0 0 30px #f59e0b; }
        .time-number { color: #8b5cf6; text-shadow: 0 0 30px #8b5cf6; }
        .pairs-number { color: #ec4899; text-shadow: 0 0 30px #ec4899; }
        
        .game-main {
            padding-top: 280px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .btn-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn {
            padding: 20px 50px;
            border: none;
            border-radius: 25px;
            font-size: 1.4em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            min-width: 240px;
        }
        .btn-main {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.5);
        }
        .btn-help {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            box-shadow: 0 20px 50px rgba(236, 72, 153, 0.5);
        }
        .action-btn:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 35px 80px rgba(0,0,0,0.7);
        }
        
        .play-area {
            background: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            border: 5px solid rgba(99, 102, 241, 0.6);
            padding: 100px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.9);
            max-width: 1400px;
            width: 100%;
        }
        
        .area-title {
            text-align: center;
            margin-bottom: 60px;
        }
        .area-title h2 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 70px rgba(59, 130, 246, 0.7);
        }
        .area-desc {
            font-size: 1.8rem;
            opacity: 0.9;
            margin-top: 20px;
            color: #e5e7eb;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 25px;
            margin-top: 60px;
            justify-items: center;
        }
        
        .game-card {
            width: 95px;
            height: 95px;
            perspective: 1200px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
        }
        
        .game-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .game-card.matched {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s ease;
        }
        
        .card-surface {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 22px;
            border: 5px solid rgba(99, 102, 241, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: 900;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        
        .card-back {
            background: linear-gradient(145deg, #374151 0%, #1f2937 100%);
            backdrop-filter: blur(25px);
            color: #f3f4f6;
        }
        
        .card-front {
            background: linear-gradient(145deg, #3b82f6 0%, #1d4ed8 100%);
            color: #ffffff;
            transform: rotateY(180deg);
            text-shadow: 0 4px 16px rgba(0,0,0,0.9);
        }
        
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(50px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }
        
        .win-box {
            background: linear-gradient(145deg, #10b981 0%, #059669 100%);
            backdrop-filter: blur(40px);
            border-radius: 60px;
            padding: 120px 100px;
            max-width: 900px;
            width: 90%;
            text-align: center;
            border: 10px solid rgba(255,255,255,0.4);
            box-shadow: 0 100px 250px rgba(16, 185, 129, 0.7);
            animation: winAppear 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes winAppear {
            0% { transform: scale(0.4) rotateY(-180deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 20px 30px; }
            .stats-container { grid-template-columns: repeat(2, 1fr); }
            .cards-grid { gap: 20px; }
            .card-surface { font-size: 2.8rem; }
            .play-area { padding: 60px 25px; }
            .win-box { padding: 80px 40px; }
        }
    </style>
</head>
<body>

    <!-- Game Header -->
    <div class="header-nav">
        <h1 class="text-4xl md:text-5xl font-black text-center mb-12 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-400 to-emerald-500 drop-shadow-4xl">
            🧠 Memory Match (8x8)
        </h1>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-title">Score</span>
                <span class="stat-number score-number" id="scoreNum">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-title">Moves</span>
                <span class="stat-number moves-number" id="movesNum">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-title">Pairs</span>
                <span class="stat-number pairs-number" id="pairsNum">0/32</span>
            </div>
            <div class="stat-box">
                <span class="stat-title">Time</span>
                <span class="stat-number time-number" id="timerNum">00:00</span>
            </div>
        </div>
    </div>

    <!-- Game Play Area -->
    <div class="game-main">
        <div class="btn-group">
            <button class="action-btn btn-main" onclick="startFreshGame()">🔄 New Game</button>
            <button class="action-btn btn-help" onclick="showMatchHint()">💡 Hint</button>
        </div>

        <div class="play-area">
            <div class="area-title">
                <h2>Match All Pairs</h2>
                <p class="area-desc">Find all 32 matching pairs in 8×8 grid. Clear board completely to win!</p>
            </div>
            <div id="cardBoard" class="cards-grid">
                <!-- 64 cards generated here -->
            </div>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="victoryScreen" class="win-overlay">
        <div class="win-box">
            <div class="text-[9rem] mb-28 drop-shadow-[0_0_150px_rgba(255,255,255,1)] animate-bounce" id="winSymbol">🧠</div>
            <h2 class="text-7xl md:text-8xl font-black mb-24 drop-shadow-[0_0_120px_rgba(16,185,129,1)]" id="winHeader">BOARD CLEARED!</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-24 mb-36 p-24 bg-black/50 backdrop-blur-xl rounded-5xl border-8 border-white/40 shadow-4xl">
                <div class="text-center">
                    <div class="text-8xl opacity-85 mb-12">🎯</div>
                    <div class="text-8xl font-black mb-8" id="finalScoreNum">2840</div>
                    <div class="text-3xl opacity-95 font-semibold">Total Score</div>
                </div>
                <div class="text-center">
                    <div class="text-8xl opacity-85 mb-12">👆</div>
                    <div class="text-8xl font-black mb-8" id="finalMovesNum">124</div>
                    <div class="text-3xl opacity-95 font-semibold">Total Moves</div>
                </div>
                <div class="text-center">
                    <div class="text-8xl opacity-85 mb-12">⏱️</div>
                    <div class="text-8xl font-black mb-8" id="finalTimeNum">05:32</div>
                    <div class="text-3xl opacity-95 font-semibold">Game Time</div>
                </div>
            </div>
            
            <div class="flex gap-24 justify-center">
                <button onclick="startFreshGame()" class="action-btn btn-main text-3xl px-36 py-18">🔄 Play Again</button>
                <button onclick="backToGameList()" class="action-btn btn-help text-3xl px-36 py-18">🏠 All Games</button>
            </div>
        </div>
    </div>

    <script>
        // ======================== GAME ENGINE ========================
        let allCards = [];
        let openCardIndices = [];
        let pairMatches = 0;
        let moveCounter = 0;
        let scoreCounter = 0;
        let timerStart = 0;
        let timerId = null;
        let gameOverState = false;

        // Generate 64 cards: 32 pairs (each symbol appears twice)
        const cardSymbols = Array(32).fill().map((_, i) => String.fromCharCode(65 + i % 26) + (Math.floor(i / 26) + 1));
        
        function createCardDeck() {
            allCards = [...cardSymbols, ...cardSymbols]; // 64 cards, 32 pairs
            allCards.sort(() => Math.random() - 0.5); // Shuffle
            
            openCardIndices = [];
            pairMatches = 0;
            moveCounter = 0;
            scoreCounter = 0;
            gameOverState = false;
            
            if (timerId) clearInterval(timerId);
            timerStart = Date.now();
            
            refreshStats();
            generateCardLayout();
            activateGameTimer();
            document.getElementById('victoryScreen').style.display = 'none';
        }

        function generateCardLayout() {
            const boardContainer = document.getElementById('cardBoard');
            boardContainer.innerHTML = '';
            
            allCards.forEach((symbol, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'game-card';
                cardDiv.dataset.cardIndex = index;
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-surface card-back">?</div>
                        <div class="card-surface card-front">${symbol}</div>
                    </div>
                `;
                
                cardDiv.addEventListener('click', function() {
                    toggleCardFlip(index);
                });
                
                boardContainer.appendChild(cardDiv);
            });
        }

        function toggleCardFlip(cardIdx) {
            if (gameOverState || openCardIndices.includes(cardIdx)) return;
            
            const selectedCard = document.querySelector(`[data-card-index="${cardIdx}"]`);
            selectedCard.classList.add('flipped');
            
            openCardIndices.push(cardIdx);
            
            if (openCardIndices.length === 2) {
                moveCounter++;
                refreshStats();
                setTimeout(() => evaluatePair(), 1100);
            }
        }

        function evaluatePair() {
            const [idx1, idx2] = openCardIndices;
            
            if (allCards[idx1] === allCards[idx2]) {
                // Match success!
                document.querySelector(`[data-card-index="${idx1}"]`).classList.add('matched');
                document.querySelector(`[data-card-index="${idx2}"]`).classList.add('matched');
                
                pairMatches++;
                scoreCounter += 50 - Math.floor(moveCounter / 2); // Penalty for more moves
                
                openCardIndices = [];
                refreshStats();
                
                if (pairMatches === 32) {
                    gameOverState = true;
                    clearInterval(timerId);
                    showCompleteVictory();
                }
            } else {
                // No match
                setTimeout(() => {
                    const card1 = document.querySelector(`[data-card-index="${idx1}"]`);
                    const card2 = document.querySelector(`[data-card-index="${idx2}"]`);
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    openCardIndices = [];
                }, 900);
            }
        }

        function refreshStats() {
            document.getElementById('scoreNum').textContent = scoreCounter;
            document.getElementById('movesNum').textContent = moveCounter;
            document.getElementById('pairsNum').textContent = `${pairMatches}/32`;
        }

        function activateGameTimer() {
            let timeElapsed = 0;
            clearInterval(timerId);
            timerId = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - timerStart) / 1000);
                const mins = Math.floor(timeElapsed / 60).toString().padStart(2, '0');
                const secs = (timeElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timerNum').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function showCompleteVictory() {
            document.getElementById('finalScoreNum').textContent = scoreCounter;
            document.getElementById('finalMovesNum').textContent = moveCounter;
            const totalTime = Math.floor((Date.now() - timerStart) / 1000);
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;
            document.getElementById('finalTimeNum').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('victoryScreen').style.display = 'flex';
        }

        function startFreshGame() {
            createCardDeck();
        }

        function showMatchHint() {
            if (pairMatches < 32 && openCardIndices.length === 0 && !gameOverState) {
                for (let i = 0; i < allCards.length; i++) {
                    if (!allCards[i].matched) {
                        const matchingCard = allCards.findIndex((val, idx) => 
                            idx !== i && val === allCards[i] && !allCards[idx].matched
                        );
                        if (matchingCard !== -1) {
                            toggleCardFlip(i);
                            setTimeout(() => toggleCardFlip(matchingCard), 700);
                            break;
                        }
                    }
                }
            }
        }

        function backToGameList() {
            window.location.href = '../../pages/games.html';
        }

        // Load game immediately
        window.addEventListener('load', createCardDeck);
    </script>

</body>
</html>

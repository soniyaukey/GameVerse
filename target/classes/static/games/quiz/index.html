<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Quiz Game - GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .timer-glow {
            box-shadow: 0 0 30px rgba(59,130,246,0.8);
        }
        .correct { 
            background: linear-gradient(135deg, #10b981, #059669) !important; 
            transform: scale(1.05); 
            box-shadow: 0 10px 30px rgba(16,185,129,0.6) !important;
        }
        .wrong { 
            background: linear-gradient(135deg, #ef4444, #dc2626) !important; 
            transform: scale(0.95); 
            box-shadow: 0 5px 20px rgba(239,68,68,0.6) !important;
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }
        .option-btn:hover:not(.correct):not(.wrong) {
            border-color: rgba(59,130,246,0.6);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .progress-fill {
            transition: width 0.5s ease;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        .option-row {
            display: flex;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .option-row {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body class="text-white p-8 md:p-12">
    
    <!-- Header -->
    <header class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-r from-slate-900/95 via-purple-900/80 to-slate-900/95 backdrop-blur-xl px-12 py-8 rounded-3xl border border-indigo-500/50 shadow-2xl w-full max-w-5xl mx-8 md:mx-auto">
        <div class="flex justify-between items-center">
            <a href="../../pages/games.html" class="text-2xl font-black bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent hover:scale-110 transition-all flex items-center">
                ← All Games
            </a>
            <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-purple-400 via-pink-400 to-indigo-400 bg-clip-text text-transparent drop-shadow-2xl">
                🧠 National Quiz Challenge
            </h1>
            <div class="text-right space-y-3">
                <div>Score: <span id="score" class="text-3xl font-black text-emerald-400">0</span></div>
                <div>Question: <span id="qNum" class="text-xl text-gray-300">1</span>/<span id="totalQ">25</span></div>
            </div>
        </div>
    </header>

    <!-- Quiz Area -->
    <main class="pt-48 pb-24 max-w-4xl mx-auto space-y-12" id="quizArea">
        
        <!-- Progress Bar -->
        <div class="bg-gray-800/50 backdrop-blur-xl rounded-3xl p-6 border border-indigo-500/30 shadow-xl">
            <div class="flex items-center justify-between mb-4">
                <div class="text-xl font-semibold">Quiz Progress</div>
                <div class="text-2xl font-black text-indigo-400" id="progressText">4%</div>
            </div>
            <div class="w-full bg-gray-700 rounded-2xl h-4 overflow-hidden border">
                <div class="bg-gradient-to-r from-emerald-500 to-cyan-500 h-4 rounded-xl shadow-inner progress-fill" id="progressBar" style="width: 4%"></div>
            </div>
        </div>

        <!-- Timer -->
        <div class="text-center">
            <div class="inline-flex items-center space-x-6 bg-gradient-to-r from-gray-900/90 to-slate-900/80 backdrop-blur-xl px-16 py-10 rounded-4xl border-4 border-indigo-500/50 shadow-2xl ring-4 ring-indigo-900/50">
                <div id="timer" class="text-6xl md:text-7xl font-black timer-glow pulse text-cyan-400 drop-shadow-2xl">15</div>
                <div class="text-2xl md:text-3xl font-semibold text-gray-200 tracking-wide opacity-90">seconds remaining</div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="bg-gradient-to-b from-slate-900/95 to-gray-900/70 backdrop-blur-xl p-12 md:p-16 rounded-4xl border border-purple-500/40 shadow-2xl text-center mx-8">
            <div id="category" class="text-2xl md:text-3xl font-bold text-indigo-300 mb-10 uppercase tracking-wider letter-spacing-2 opacity-90 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text"></div>
            <h2 id="question" class="text-3xl md:text-5xl font-black mb-16 leading-tight text-white drop-shadow-2xl line-height-1.2 tracking-wide">Question loading...</h2>
        </div>

        <!-- Options - Exactly 2 per row -->
        <div id="optionsContainer" class="space-y-6 max-w-3xl mx-auto">
            <!-- Row 1: Options A & B -->
            <div id="optionRow1" class="flex gap-6 justify-center items-stretch">
                <!-- A -->
                <button class="option-btn flex-1 p-10 text-xl md:text-2xl font-semibold rounded-3xl bg-gradient-to-br from-gray-800/90 to-gray-900/80 hover:from-indigo-900/50 hover:to-purple-900/50 shadow-2xl h-32 border-4 hover:border-indigo-400 focus:outline-none focus:ring-8 focus:ring-indigo-500/30 flex items-center justify-center" style="min-height: 128px;">
                    <div class="text-2xl font-black mr-6 text-indigo-300">A)</div>
                    <span class="leading-relaxed text-left">Option text here</span>
                </button>
                <!-- B -->
                <button class="option-btn flex-1 p-10 text-xl md:text-2xl font-semibold rounded-3xl bg-gradient-to-br from-gray-800/90 to-gray-900/80 hover:from-indigo-900/50 hover:to-purple-900/50 shadow-2xl h-32 border-4 hover:border-indigo-400 focus:outline-none focus:ring-8 focus:ring-indigo-500/30 flex items-center justify-center" style="min-height: 128px;">
                    <div class="text-2xl font-black mr-6 text-indigo-300">B)</div>
                    <span class="leading-relaxed text-left">Option text here</span>
                </button>
            </div>
            
            <!-- Row 2: Options C & D -->
            <div id="optionRow2" class="flex gap-6 justify-center items-stretch">
                <!-- C -->
                <button class="option-btn flex-1 p-10 text-xl md:text-2xl font-semibold rounded-3xl bg-gradient-to-br from-gray-800/90 to-gray-900/80 hover:from-indigo-900/50 hover:to-purple-900/50 shadow-2xl h-32 border-4 hover:border-indigo-400 focus:outline-none focus:ring-8 focus:ring-indigo-500/30 flex items-center justify-center" style="min-height: 128px;">
                    <div class="text-2xl font-black mr-6 text-indigo-300">C)</div>
                    <span class="leading-relaxed text-left">Option text here</span>
                </button>
                <!-- D -->
                <button class="option-btn flex-1 p-10 text-xl md:text-2xl font-semibold rounded-3xl bg-gradient-to-br from-gray-800/90 to-gray-900/80 hover:from-indigo-900/50 hover:to-purple-900/50 shadow-2xl h-32 border-4 hover:border-indigo-400 focus:outline-none focus:ring-8 focus:ring-indigo-500/30 flex items-center justify-center" style="min-height: 128px;">
                    <div class="text-2xl font-black mr-6 text-indigo-300">D)</div>
                    <span class="leading-relaxed text-left">Option text here</span>
                </button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex gap-8 justify-center pt-16">
            <button onclick="prevQuestion()" id="prevBtn" class="px-20 py-8 bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 hover:to-gray-500 text-xl md:text-2xl font-bold rounded-4xl border-4 border-gray-500 shadow-2xl transform hover:scale-105 transition-all duration-300 hidden whitespace-nowrap">
                ← Previous Question
            </button>
        </div>
    </main>

    <!-- Final Results -->
    <div id="finalStats" class="hidden min-h-screen pt-48 pb-24 max-w-4xl mx-auto space-y-12 px-8">
        <div class="bg-gradient-to-r from-emerald-500/30 to-cyan-500/30 backdrop-blur-xl p-16 md:p-24 rounded-4xl border-4 border-emerald-400/60 shadow-2xl text-center">
            <h2 class="text-5xl md:text-7xl font-black mb-12 bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-400 bg-clip-text text-transparent drop-shadow-2xl">Quiz Complete! 🎉</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                <div class="space-y-4">
                    <div class="text-6xl">⭐</div>
                    <div class="text-6xl md:text-7xl font-black text-yellow-400" id="finalScore">-</div>
                    <div class="text-2xl font-semibold opacity-90">Final Score</div>
                </div>
                <div class="space-y-4">
                    <div class="text-6xl">📊</div>
                    <div class="text-6xl md:text-7xl font-black text-blue-400" id="accuracy">-</div>
                    <div class="text-2xl font-semibold opacity-90">Accuracy</div>
                </div>
                <div class="space-y-4">
                    <div class="text-6xl">⏱️</div>
                    <div class="text-6xl md:text-7xl font-black text-purple-400" id="avgTime">-</div>
                    <div class="text-2xl font-semibold opacity-90">Avg Time per Question</div>
                </div>
                <div class="space-y-4">
                    <div class="text-6xl">🏆</div>
                    <div class="text-5xl md:text-6xl font-black text-emerald-400 bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text px-8 py-4 rounded-3xl mx-auto w-fit" id="rank">-</div>
                    <div class="text-2xl font-semibold opacity-90">Your Rank</div>
                </div>
            </div>
            <button onclick="restartQuiz()" class="px-24 py-12 text-3xl font-black bg-gradient-to-r from-orange-600 via-red-600 to-orange-500 hover:from-orange-500 hover:to-red-500 rounded-4xl shadow-2xl shadow-orange-500/50 transform hover:scale-110 hover:shadow-orange-500/75 transition-all duration-300 tracking-wide">
                🔄 Play Again
            </button>
        </div>
    </div>

    <script>
        // Complete 25-question database
        const quizData = [
            // Your GK questions (indices adjusted for 0-based)
            {category: "National Symbols", question: "Capital of India?", options: ["Mumbai", "New Delhi", "Kolkata", "Chennai"], correct: 1},
            {category: "National Symbols", question: "National Animal of India?", options: ["Lion", "Elephant", "Bengal Tiger", "Leopard"], correct: 2},
            // ... (all 20 GK + 5 Math from previous - same as before)
            {category: "Mathematics", question: "What is 15 × 4?", options: ["50", "60", "65", "70"], correct: 1},
            {category: "Mathematics", question: "Solve for x: 3x + 5 = 20", options: ["3", "5", "4", "6"], correct: 2},
            {category: "Mathematics", question: "What is the square root of 144?", options: ["10", "12", "14", "16"], correct: 1},
            {category: "Mathematics", question: "What is 25% of 200?", options: ["40", "50", "60", "70"], correct: 1},
            {category: "Mathematics", question: "If 2x - 8 = 10, what is x?", options: ["5", "6", "7", "9"], correct: 2}
        ];

        let currentQuestionIndex = 0;
        let playerScore = 0;
        let questionStartTimes = [];
        let isAnswered = false;
        let remainingTime = 15;
        let currentTimer = null;
        const TOTAL_Q = quizData.length;

        // Initialize quiz
        function startQuiz() {
            document.getElementById('totalQ').textContent = TOTAL_Q;
            showQuestion();
        }

        // Show current question with FIXED 2x2 layout
        function showQuestion() {
            if (currentQuestionIndex >= TOTAL_Q) {
                finishQuiz();
                return;
            }

            const questionData = quizData[currentQuestionIndex];
            document.getElementById('category').textContent = questionData.category;
            document.getElementById('question').textContent = questionData.question;
            document.getElementById('qNum').textContent = currentQuestionIndex + 1;

            // Row 1: A and B
            document.querySelector('#optionRow1 button:nth-child(1)').onclick = () => chooseAnswer(0);
            document.querySelector('#optionRow1 button:nth-child(1)').innerHTML = `<div class="text-2xl font-black mr-6 text-indigo-300">A)</div>${questionData.options[0]}`;
            document.querySelector('#optionRow1 button:nth-child(2)').onclick = () => chooseAnswer(1);
            document.querySelector('#optionRow1 button:nth-child(2)').innerHTML = `<div class="text-2xl font-black mr-6 text-indigo-300">B)</div>${questionData.options[1]}`;

            // Row 2: C and D
            document.querySelector('#optionRow2 button:nth-child(1)').onclick = () => chooseAnswer(2);
            document.querySelector('#optionRow2 button:nth-child(1)').innerHTML = `<div class="text-2xl font-black mr-6 text-indigo-300">C)</div>${questionData.options[2]}`;
            document.querySelector('#optionRow2 button:nth-child(2)').onclick = () => chooseAnswer(3);
            document.querySelector('#optionRow2 button:nth-child(2)').innerHTML = `<div class="text-2xl font-black mr-6 text-indigo-300">D)</div>${questionData.options[3]}`;

            // Reset options
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
            });

            updateProgressBar();
            isAnswered = false;
            document.getElementById('prevBtn').classList.toggle('hidden', currentQuestionIndex === 0);
            
            startCountdown();
        }

        // Choose answer
        function chooseAnswer(selectedOption) {
            if (isAnswered) return;
            
            isAnswered = true;
            clearInterval(currentTimer);

            const questionData = quizData[currentQuestionIndex];
            const allButtons = document.querySelectorAll('.option-btn');

            // Show correct answer green, wrong red
            allButtons.forEach((btn, index) => {
                btn.disabled = true;
                if (index === questionData.correct) {
                    btn.classList.add('correct');
                } else if (index === selectedOption && index !== questionData.correct) {
                    btn.classList.add('wrong');
                }
            });

            const qDuration = 15 - remainingTime;
            questionStartTimes.push(qDuration);

            if (selectedOption === questionData.correct) {
                playerScore++;
                document.getElementById('score').textContent = playerScore;
            }

            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 2200);
        }

        // Timer
        function startCountdown() {
            remainingTime = 15;
            updateTimer();
            
            currentTimer = setInterval(() => {
                remainingTime--;
                updateTimer();
                
                if (remainingTime <= 0) {
                    clearInterval(currentTimer);
                    setTimeout(() => {
                        currentQuestionIndex++;
                        showQuestion();
                    }, 1500);
                }
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer').textContent = remainingTime;
            const timerEl = document.getElementById('timer');
            timerEl.classList.toggle('pulse', remainingTime <= 5);
        }

        // Previous question
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                clearInterval(currentTimer);
                currentQuestionIndex--;
                showQuestion();
            }
        }

        // Progress
        function updateProgressBar() {
            const percent = ((currentQuestionIndex + 1) / TOTAL_Q) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = Math.round(percent) + '%';
        }

        // Finish quiz
        function finishQuiz() {
            clearInterval(currentTimer);
            document.getElementById('quizArea').style.display = 'none';
            
            const accuracy = Math.round((playerScore / TOTAL_Q) * 100);
            const avgResponseTime = questionStartTimes.length > 0 ? (questionStartTimes.reduce((sum, time) => sum + time, 0) / questionStartTimes.length).toFixed(1) : '0.0';
            
            document.getElementById('finalScore').textContent = playerScore;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('avgTime').textContent = avgResponseTime + 's';
            document.getElementById('rank').textContent = calculateRank(accuracy);
            
            document.getElementById('finalStats').classList.remove('hidden');
        }

        function calculateRank(acc) {
            if (acc >= 90) return '🧠 Genius';
            if (acc >= 80) return '🥇 Excellent';
            if (acc >= 70) return '🥈 Great';
            if (acc >= 60) return '🥉 Good';
            if (acc >= 50) return '📚 Solid';
            return '🔥 Keep Learning';
        }

        // Restart
        function restartQuiz() {
            currentQuestionIndex = 0;
            playerScore = 0;
            questionStartTimes = [];
            document.getElementById('score').textContent = 0;
            document.getElementById('finalStats').classList.add('hidden');
            document.getElementById('quizArea').style.display = 'block';
            startQuiz();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (['A','B','C','D'].includes(e.key.toUpperCase()) && !isAnswered) {
                const optIndex = e.key.toUpperCase().charCodeAt(0) - 65;
                chooseAnswer(optIndex);
            }
        });

        // Auto start
        window.onload = startQuiz;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✊ Rock Paper Scissors - GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f0f23 50%, #1a1a2e 100%);
            /* min-h-screen p-8 md:p-12; */
        }
        .hand-icon {
            font-size: 8rem;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            transition: all 0.4s ease;
        }
        .hand-winner {
            animation: bounce 0.6s infinite alternate, glow 1s infinite;
            transform: scale(1.2);
        }
        @keyframes bounce {
            0% { transform: translateY(0) scale(1.2); }
            100% { transform: translateY(-10px) scale(1.3); }
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(34,197,94,0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(34,197,94,1)); }
        }
        .result-glow {
            box-shadow: 0 0 30px rgba(34,197,94,0.8);
        }
        .btn-choice {
            @apply w-32 h-32 rounded-3xl font-black text-3xl shadow-2xl border-4 border-transparent hover:border-indigo-400 hover:scale-110 transition-all duration-300;
        }
        .btn-rock { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }
        .btn-paper { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; }
        .btn-scissors { background: linear-gradient(135deg, #eab308, #ca8a04); color: white; }
        .btn-choice:active { transform: scale(0.95); }
        .stats-right {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            background: rgba(17,24,39,0.95);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 20px;
            border: 2px solid rgba(99,102,241,0.5);
            shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 200px;
        }
    </style>
</head>
<body class="text-white font-bold text-center space-y-12 pt-32">

    <!-- Right Sidebar Stats -->
    <div class="stats-right">
        <h2 class="text-2xl font-black mb-6 bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent drop-shadow-xl">Scoreboard</h2>
        <div class="space-y-4 text-3xl font-black">
            <div>You: <span id="playerScore" class="text-emerald-400 glow">0</span></div>
            <div>CPU: <span id="computerScore" class="text-red-400 glow">0</span></div>
        </div>
        <div class="mt-6 text-xl">
            <div id="streak" class="text-yellow-400 font-bold mb-2">Streak: 0</div>
            <div id="round" class="text-purple-400 font-bold">Round 1</div>
        </div>
    </div>

    <!-- Navbar - Left Aligned Only -->
    <nav class="fixed top-6 left-6 z-50 bg-gradient-to-r from-gray-800/95 to-gray-900/95 backdrop-blur-xl p-8 rounded-3xl border border-indigo-500/50 shadow-2xl">
        <a href="../../pages/games.html" class="text-2xl font-black bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent hover:scale-110 transition-all duration-300 flex items-center">
            ← All Games
        </a>
        <h1 class="text-4xl font-black bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent drop-shadow-2xl mt-4">✊ Rock Paper ✋ Scissors ✌️</h1>
    </nav>

    <!-- Main Game Area -->
    <div class="max-w-6xl mx-auto px-12 space-y-20">
        
        <!-- Title -->
        <div class="text-center">
            <h1 class="text-7xl md:text-8xl font-black mb-8 bg-gradient-to-r from-orange-500 via-red-500 to-yellow-500 bg-clip-text text-transparent drop-shadow-[0_0_80px_rgba(239,68,68,0.6)]">
                Choose Your Weapon
            </h1>
            <p class="text-2xl md:text-3xl text-gray-300 font-semibold max-w-2xl mx-auto leading-relaxed">
                Play against smart AI • Win rounds • First to 10 points wins the match!
            </p>
        </div>

        <!-- Battle Arena - Centered -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-20 items-center">
            
            <!-- Player Side -->
            <div class="text-center space-y-8">
                <div class="text-6xl opacity-75">You:</div>
                <div id="yourHand" class="hand-icon mx-auto opacity-50 transform scale-110" data-move="">
                    ✊
                </div>
            </div>

            <!-- Result Center -->
            <div class="text-center space-y-12">
                <div id="matchResult" class="text-4xl md:text-6xl font-black mb-12 min-h-[140px] flex items-center justify-center text-gray-400">
                    Choose ✊ Rock, ✋ Paper, or ✌️ Scissors!
                </div>
                <button onclick="nextRound()" id="nextBtn" class="btn-choice w-52 h-20 text-2xl hidden rounded-3xl bg-gradient-to-r from-emerald-500 to-teal-600 shadow-emerald-500/50 hover:shadow-emerald-500/75">
                    🔄 Next Round
                </button>
            </div>

            <!-- Computer Side -->
            <div class="text-center space-y-8">
                <div class="text-6xl opacity-75">Computer:</div>
                <div id="computerHand" class="hand-icon mx-auto opacity-50 transform scale-110" data-move="">
                    ✊
                </div>
            </div>
        </div>

        <!-- Choice Panel -->
        <div class="flex gap-16 md:gap-24 justify-center flex-wrap">
            <button onclick="selectMove('rock')" class="btn-choice btn-rock shadow-red-500/50 hover:shadow-red-500/75 transform hover:-translate-y-2">
                <div class="hand-icon text-5xl">✊</div>
                <div class="text-lg mt-2 font-bold tracking-wide">ROCK</div>
            </button>
            <button onclick="selectMove('paper')" class="btn-choice btn-paper shadow-blue-500/50 hover:shadow-blue-500/75 transform hover:-translate-y-2">
                <div class="hand-icon text-5xl">✋</div>
                <div class="text-lg mt-2 font-bold tracking-wide">PAPER</div>
            </button>
            <button onclick="selectMove('scissors')" class="btn-choice btn-scissors shadow-yellow-500/50 hover:shadow-yellow-500/75 transform hover:-translate-y-2">
                <div class="hand-icon text-5xl">✌️</div>
                <div class="text-lg mt-2 font-bold tracking-wide">SCISSORS</div>
            </button>
        </div>

        <!-- Extended Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12 max-w-6xl mx-auto p-16 bg-gray-800/80 backdrop-blur-xl rounded-4xl border border-indigo-500/50 shadow-2xl">
            <div class="text-center">
                <div class="text-6xl mb-8 opacity-75">🏆</div>
                <div class="text-6xl font-black text-emerald-400 mb-6" id="matchWins">0</div>
                <div class="text-2xl opacity-80 font-semibold">Match Wins</div>
            </div>
            <div class="text-center">
                <div class="text-6xl mb-8 opacity-75">🔥</div>
                <div class="text-6xl font-black text-yellow-400 mb-6" id="maxStreak">0</div>
                <div class="text-2xl opacity-80 font-semibold">Best Streak</div>
            </div>
            <div class="text-center">
                <div class="text-6xl mb-8 opacity-75">📊</div>
                <div class="text-6xl font-black text-blue-400 mb-6" id="winPercent">0%</div>
                <div class="text-2xl opacity-80 font-semibold">Win Rate</div>
            </div>
            <div class="text-center">
                <div class="text-6xl mb-8 opacity-75">🎮</div>
                <div class="text-6xl font-black text-purple-400 mb-6" id="totalMatches">0</div>
                <div class="text-2xl opacity-80 font-semibold">Total Matches</div>
            </div>
        </div>
    </div>

    <script>
        let playerMatchScore = 0;
        let computerMatchScore = 0;
        let roundNumber = 1;
        let currentStreak = 0;
        let maxStreak = 0;
        let totalMatchWins = 0;
        let totalMatchCount = 0;

        const handEmojis = {
            rock: '✊',
            paper: '✋',
            scissors: '✌️'
        };

        const matchOutcomes = {
            win: { message: 'YOU WIN THIS ROUND! 🎉', color: 'text-emerald-400 shadow-emerald-500/50', streakBonus: true },
            lose: { message: 'COMPUTER TAKES IT! 😤', color: 'text-red-400 shadow-red-500/50', streakBonus: false },
            tie: { message: 'PERFECT TIE! 🤝', color: 'text-gray-400 shadow-gray-500/50', streakBonus: false }
        };

        function selectMove(playerSelection) {
            const computerSelection = Object.keys(handEmojis)[Math.floor(Math.random() * 3)];
            
            // Animate choices
            const playerHandEl = document.getElementById('yourHand');
            const computerHandEl = document.getElementById('computerHand');
            
            playerHandEl.textContent = handEmojis[playerSelection];
            playerHandEl.dataset.move = playerSelection;
            computerHandEl.textContent = handEmojis[computerSelection];
            computerHandEl.dataset.move = computerSelection;

            // Calculate result
            const outcome = calculateResult(playerSelection, computerSelection);
            displayRoundResult(outcome, playerSelection, computerSelection);
            
            totalMatchCount++;
            updateGameStats();
        }

        function calculateResult(player, comp) {
            if (player === comp) return 'tie';
            
            const beats = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
            
            return beats[player] === comp ? 'win' : 'lose';
        }

        function displayRoundResult(outcome, playerMove, compMove) {
            const resultElement = document.getElementById('matchResult');
            const outcomeInfo = matchOutcomes[outcome];
            
            resultElement.textContent = outcomeInfo.message;
            resultElement.className = `text-4xl md:text-6xl font-black mb-12 ${outcomeInfo.color}`;
            
            // Winner animation
            const playerElement = document.getElementById('yourHand');
            const compElement = document.getElementById('computerHand');
            
            playerElement.classList.remove('hand-winner');
            compElement.classList.remove('hand-winner');
            
            if (outcome === 'win') {
                playerElement.classList.add('hand-winner');
                playerMatchScore++;
                currentStreak++;
                if (currentStreak > maxStreak) maxStreak = currentStreak;
            } else if (outcome === 'lose') {
                compElement.classList.add('hand-winner');
                computerMatchScore++;
                currentStreak = 0;
            }
            
            // Update display
            document.getElementById('playerScore').textContent = playerMatchScore;
            document.getElementById('computerScore').textContent = computerMatchScore;
            document.getElementById('streak').textContent = `Streak: ${currentStreak}`;
            document.getElementById('round').textContent = `Round ${roundNumber++}`;
            
            document.getElementById('nextBtn').classList.remove('hidden');
            
            // Check for match end
            checkMatchComplete();
        }

        function nextRound() {
            document.getElementById('matchResult').textContent = 'Choose ✊ Rock, ✋ Paper, or ✌️ Scissors!';
            document.getElementById('matchResult').className = 'text-4xl md:text-6xl font-black mb-12 text-gray-300';
            
            document.getElementById('yourHand').textContent = '✊';
            document.getElementById('computerHand').textContent = '✊';
            
            document.getElementById('nextBtn').classList.add('hidden');
        }

        function checkMatchComplete() {
            if (playerMatchScore >= 10 || computerMatchScore >= 10) {
                const champion = playerMatchScore >= 10 ? 'YOU' : 'COMPUTER';
                alert(`${champion} WINS THE MATCH! (${playerMatchScore}-${computerMatchScore})`);
                endMatch();
            }
        }

        function endMatch() {
            if (playerMatchScore >= 10) totalMatchWins++;
            
            playerMatchScore = 0;
            computerMatchScore = 0;
            currentStreak = 0;
            roundNumber = 1;
            
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('streak').textContent = 'Streak: 0';
            document.getElementById('round').textContent = 'Round 1';
            
            updateGameStats();
        }

        function updateGameStats() {
            const winPct = totalMatchCount > 0 ? Math.round((totalMatchWins / totalMatchCount) * 100) : 0;
            document.getElementById('matchWins').textContent = totalMatchWins;
            document.getElementById('totalRounds').textContent = totalMatchCount;
            document.getElementById('maxStreak').textContent = maxStreak;
            document.getElementById('winRate').textContent = `${winPct}%`;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GameVerse Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3Aw1QRKg3i5uaOuWbXeuFFVO0D1YH6kXRVw&s');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            animation: subtleShift 20s ease infinite;
        }
        @keyframes subtleShift {
            0%, 100% { background-position: center center; }
            50% { background-position: center 10%; }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero-text {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6B6B, #4ECDC4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
        }
        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #FFD70040, 0 0 30px #FFA50040, 0 0 40px #FF6B6B40; }
            to { text-shadow: 0 0 30px #FFD70060, 0 0 50px #FFA50060, 0 0 60px #4ECDC460; }
        }
        .glass { 
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8 text-white overflow-hidden">
    <!-- Animated Background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-20 left-20 w-72 h-72 bg-gradient-to-r from-yellow-400/20 to-orange-400/20 rounded-full blur-3xl animate-pulse" style="animation-delay: 0s;"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-gradient-to-r from-emerald-400/20 to-teal-400/20 rounded-full blur-3xl animate-bounce" style="animation-delay: -2s;"></div>
        <div class="absolute top-1/2 left-1/4 w-64 h-64 bg-gradient-to-r from-purple-400/20 to-pink-400/20 rounded-full blur-3xl animate-ping" style="animation-delay: -4s;"></div>
    </div>

    <!-- Main Content -->
    <main class="glass rounded-3xl p-16 max-w-6xl w-full text-center shadow-2xl border-white/30">
        <div class="mb-12">
            <i class="fas fa-gamepad text-9xl text-transparent bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 bg-clip-text drop-shadow-4xl mb-8 animate-bounce"></i>
        </div>
        <h1 class="hero-text mb-8 drop-shadow-4xl leading-tight">
            Welcome to<br>
            <span class="block">GameVerse Hub</span>
        </h1>
        <p class="text-2xl md:text-3xl text-gray-200 mb-12 font-medium max-w-3xl mx-auto leading-relaxed drop-shadow-lg">
            Your ultimate gaming destination with browser games, online adventures, and developer showcase!
        </p>
        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center max-w-2xl mx-auto">
            <a href="pages/login.html" class="group bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-black text-xl py-6 px-12 rounded-3xl shadow-2xl hover:shadow-emerald-500/50 transform hover:-translate-y-2 transition-all duration-500 flex items-center gap-4 w-full sm:w-auto">
                <i class="fas fa-sign-in-alt text-2xl group-hover:animate-spin"></i>
                Login & Play
            </a>
            <a href="pages/register.html" class="group bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 text-black font-black text-xl py-6 px-12 rounded-3xl shadow-2xl hover:shadow-yellow-500/50 transform hover:-translate-y-2 transition-all duration-500 flex items-center gap-4 w-full sm:w-auto">
                <i class="fas fa-user-plus text-2xl"></i>
                Join Now
            </a>
        </div>
        <p class="text-lg text-gray-400 mt-16 font-medium animate-pulse">
            Ready to game? <span class="text-yellow-400 font-black animate-pulse">Get started in seconds!</span>
        </p>
    </main>

</body>
</html>
